name = "noru-reviews"
main = "src/worker.ts"
compatibility_date = "2026-06-28"

# Arquivos estáticos de public/ servidos pelo binding ASSETS.
# /api/* é tratado pelo Worker (src/worker.ts → src/server/app.ts).
[assets]
directory = "./public"
binding = "ASSETS"

# Crie o banco com `npm run db:create` e cole o database_id aqui.
# O database_id NÃO é segredo — pode (e deve) ser versionado.
# É obrigatório para o deploy do Worker encontrar o D1.
[[d1_databases]]
binding = "DB"
database_name = "noru_reviews"
database_id = "4214e4cc-3c36-43da-8d67-2eca4290a2cd"
migrations_dir = "migrations"

[vars]
PUBLIC_TENANT_SLUG = "noru"
SESSION_COOKIE_NAME = "noru_admin_session"
ADMIN_SESSION_DAYS = "7"
PUBLIC_REVIEW_MIN_RATING = "4"
# ALLOWED_ORIGINS = "http://localhost:8788,https://seu-dominio.com.br"

# Use COOKIE_SECURE = "false" somente em desenvolvimento local se o navegador bloquear o cookie em HTTP.
