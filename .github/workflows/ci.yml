name: CI

# Portão de qualidade: roda o type check a cada push e pull request.
# O deploy é feito pela integração Git do Cloudflare Pages (build automático
# no push), não por este workflow.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Type check
        run: npm run typecheck
